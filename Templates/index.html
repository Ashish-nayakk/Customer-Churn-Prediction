<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Churn Prediction – Premium Light Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>

    /* Animated Blue Gradient Background */
    body {
      background: linear-gradient(-45deg, #4b6cb7, #6f86d6, #48c6ef, #182848);
      background-size: 400% 400%;
      animation: gradientFlow 14s ease infinite;
      font-family: "Segoe UI", sans-serif;
      color: #ffffff;
      transition: 0.3s;
    }
    @keyframes gradientFlow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Glassmorphic Main Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.18);
      padding: 35px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      animation: fadeUp 1s ease-out;
    }

    /* Inputs */
    .input-field {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.7);
      color: #001a33;
      transition: 0.25s;
    }

    .input-field:focus {
      background: rgba(255,255,255,0.65);
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      outline: none;
    }

    /* Dropdown Dropdown Options */
    .input-field option {
      background: rgba(230,244,255,0.96);
      color: #001a33;
      padding: 10px;
      font-weight: 500;
    }
    .input-field option:hover {
      background: #badeff !important;
    }

    /* Predict Button */
    .btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      padding: 12px 26px;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      transition: 0.25s;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,255,255,0.45);
    }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .spinner {
      width: 70px;
      height: 70px;
      border: 6px solid #ffffff3b;
      border-top-color: #00e4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from {transform: rotate(0);} to {transform: rotate(360deg);} }

    /* Animations */
    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(25px);}
      to   {opacity: 1; transform: translateY(0);}
    }
    @keyframes float {
      0% {transform: translateY(0);}
      50% {transform: translateY(-12px);}
      100% {transform: translateY(0);}
    }
    .floating { animation: float 4s ease-in-out infinite; }

    /* Chart Cards */
    .chart-card {
      background: rgba(255,255,255,0.30);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

  <!-- Loader -->
  <div id="loader"><div class="spinner"></div></div>

  <!-- MAIN CARD -->
  <div class="w-full max-w-4xl glass-card">

    <h1 class="text-4xl text-center font-extrabold mb-10 floating">
      🌐 Customer Churn Prediction Dashboard
    </h1>

    <!-- FORM -->
    <form method="POST" onsubmit="showLoader()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div><label>Age</label><input class="input-field" name="age" value="30"></div>

      <div><label>Gender</label><select class="input-field" name="gender"><option>Male</option><option>Female</option></select></div>

      <div><label>Tenure (months)</label><input class="input-field" name="tenure" value="12"></div>

      <div><label>Monthly Charges</label><input class="input-field" name="monthly_charges" value="70"></div>

      <div><label>Total Charges</label><input class="input-field" name="total_charges" value="1000"></div>

      <div><label>Contract</label><select class="input-field" name="contract"><option>Month-to-month</option><option>One year</option><option>Two year</option></select></div>

      <div><label>Internet</label><select class="input-field" name="internet"><option>No</option><option>DSL</option><option>Fiber Optic</option></select></div>

      <div><label>Tech Support</label><select class="input-field" name="techsupport"><option>No</option><option>Yes</option></select></div>

      <div class="col-span-2 text-center mt-6">
        <button class="btn">🔍 Predict Now</button>
      </div>

    </form>

    <!-- RESULTS -->
    {% if result %}
    <div class="mt-12 fade-up">

      <h2 class="text-3xl font-semibold text-center mb-2">
        Prediction: <span class="text-cyan-300">{{ result }}</span>
      </h2>

      <p class="text-center text-lg mb-6">
        Churn Probability: <b>{{ prob }}%</b>
      </p>

      <!-- CHARTS -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="chart-card"><div id="gauge"></div></div>
        <div class="chart-card"><div id="donut"></div></div>
      </div>

      <div class="chart-card mt-10"><div id="barchart"></div></div>

      <!-- PLOTLY CHART RENDER -->
      <script>
      function renderCharts() {

        const paper = "rgba(230,244,255,0.9)";
        const plot  = "rgba(240,250,255,0.8)";
        const textC = "#0a1a33";

        ////// GAUGE //////
        var gauge = {{ gauge_json | safe }};
        gauge.layout.paper_bgcolor = paper;
        gauge.layout.plot_bgcolor = plot;
        gauge.layout.font = {color: textC};
        Plotly.newPlot("gauge", gauge.data, gauge.layout);

        ////// DONUT //////
        Plotly.newPlot("donut", [{
            values:[{{ prob }}, {{ 100 - prob }}],
            labels:["Churn","Not Churn"],
            type:"pie",
            hole:.55,
            marker:{
              colors:[
                "rgba(0,224,255,1)",
                "rgba(0,122,255,0.25)"
              ]
            },
            textfont:{color:textC}
        }],
        {
            title:"Churn Distribution",
            paper_bgcolor:paper,
            plot_bgcolor:plot,
            font:{color:textC}
        });

        ////// BAR //////
        Plotly.newPlot("barchart", [{
            x:["Churn Probability"],
            y:[{{ prob }}],
            type:"bar",
            marker:{color:"#00e4ff"}
        }],
        {
            title:"Risk Level",
            paper_bgcolor:paper,
            plot_bgcolor:plot,
            font:{color:textC}
        });
      }

      document.addEventListener("DOMContentLoaded", renderCharts);

      function showLoader() {
        document.getElementById("loader").style.display = "flex";
        setTimeout(() => { document.getElementById("loader").style.display = "none"; }, 1200);
      }
      </script>

    </div>
    {% endif %}
  </div>

</body>
</html>
